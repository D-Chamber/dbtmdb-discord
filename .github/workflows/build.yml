name: Build

on:
    push:
        branches:
            - main
        tags:
            - "v*"
    pull_request:
        branches:
            - main

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                goos: [linux, windows, darwin]
                goarch: [amd64]
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: 1.21

            - name: Build
              run: |
                  GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o bin/discord-tmdb-bot-${{ matrix.goos }}-${{ matrix.goarch }} .

            - name: Upload binaries
              uses: actions/upload-artifact@v4
              with:
                  name: discord-tmdb-bot-${{ matrix.goos }}-${{ matrix.goarch }}
                  path: bin/discord-tmdb-bot-${{ matrix.goos }}-${{ matrix.goarch }}

    release:
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Download binaries
              uses: actions/download-artifact@v4
              with:
                  path: bin

            - name: Create Release
              id: create_release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref_name }}
                  release_name: Release ${{ github.ref_name }}
                  draft: false
                  prerelease: false

            - name: Upload Release Assets
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ steps.create_release.outputs.upload_url }}
                  asset_path: ./bin/discord-tmdb-bot-linux-amd64/discord-tmdb-bot-linux-amd64
                  asset_name: discord-tmdb-bot-linux-amd64
                  asset_content_type: application/octet-stream

            - name: Upload Release Assets
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ steps.create_release.outputs.upload_url }}
                  asset_path: ./bin/discord-tmdb-bot-windows-amd64/discord-tmdb-bot-windows-amd64.exe
                  asset_name: discord-tmdb-bot-windows-amd64.exe
                  asset_content_type: application/octet-stream

            - name: Upload Release Assets
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ steps.create_release.outputs.upload_url }}
                  asset_path: ./bin/discord-tmdb-bot-darwin-amd64/discord-tmdb-bot-darwin-amd64
                  asset_name: discord-tmdb-bot-darwin-amd64
                  asset_content_type: application/octet-stream
